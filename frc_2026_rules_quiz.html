<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FRC 2026 REBUILT — Rules Quiz</title>
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#000000;--surface:#0d0d12;--surface2:#15151e;--surface3:#1e1e2a;
  --border:#2a2a3d;--text:#e8eaf0;--text2:#9ca3b8;--text3:#636b82;
  --accent:#800080;--accent2:#a832a8;--accent-glow:rgba(128,0,128,.15);
  --green:#22c55e;--green-bg:rgba(34,197,94,.12);--green-border:rgba(34,197,94,.3);
  --red:#ef4444;--red-bg:rgba(239,68,68,.12);--red-border:rgba(239,68,68,.3);
  --yellow:#eab308;--blue:#3b82f6;--blue-bg:rgba(59,130,246,.1);
}
html{font-size:16px}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;overflow-x:hidden}
.noise{position:fixed;inset:0;pointer-events:none;opacity:.03;z-index:9999;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
}
.app{max-width:800px;margin:0 auto;padding:24px 20px 60px}
.header{text-align:center;padding:48px 0 40px;position:relative}
.header::after{content:'';position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:120px;height:2px;background:linear-gradient(90deg,transparent,var(--accent),transparent)}
.logo-badge{display:inline-flex;align-items:center;gap:8px;background:var(--accent-glow);border:1px solid rgba(128,0,128,.25);border-radius:100px;padding:6px 16px 6px 10px;margin-bottom:16px;font-size:.75rem;letter-spacing:.08em;text-transform:uppercase;color:var(--accent2);font-weight:600}
.logo-badge .dot{width:8px;height:8px;border-radius:50%;background:var(--accent);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.header h1{font-family:'Archivo Black',sans-serif;font-size:clamp(2rem,5vw,3rem);line-height:1.05;letter-spacing:-.02em;background:linear-gradient(135deg,#fff 30%,var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.header p{color:var(--text2);margin-top:10px;font-size:.95rem;max-width:500px;margin-left:auto;margin-right:auto;line-height:1.5}
.categories{display:grid;gap:12px;margin-top:40px}
.cat-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:20px 24px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden}
.cat-card:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:0 8px 32px rgba(128,0,128,.08)}
.cat-card.selected{border-color:var(--accent);background:var(--accent-glow)}
.cat-card .cat-tag{font-family:'JetBrains Mono',monospace;font-size:.7rem;color:var(--accent2);letter-spacing:.06em;text-transform:uppercase;margin-bottom:6px}
.cat-card h3{font-size:1.05rem;font-weight:700;margin-bottom:4px}
.cat-card p{font-size:.82rem;color:var(--text3);line-height:1.4}
.cat-card .q-count{position:absolute;right:20px;top:50%;transform:translateY(-50%);font-family:'JetBrains Mono',monospace;font-size:.75rem;color:var(--text3);background:var(--surface2);padding:4px 10px;border-radius:6px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;font-family:'DM Sans',sans-serif;font-weight:600;font-size:.9rem;padding:12px 28px;border-radius:10px;border:none;cursor:pointer;transition:all .2s}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:var(--accent2);transform:translateY(-1px);box-shadow:0 6px 24px rgba(128,0,128,.25)}
.btn-primary:disabled{opacity:.4;cursor:not-allowed;transform:none;box-shadow:none}
.btn-secondary{background:var(--surface2);color:var(--text);border:1px solid var(--border)}
.btn-secondary:hover{border-color:var(--text3)}
.btn-group{display:flex;gap:10px;margin-top:28px;justify-content:center;flex-wrap:wrap}
.progress-bar{display:flex;align-items:center;gap:14px;margin-bottom:28px}
.progress-track{flex:1;height:6px;background:var(--surface2);border-radius:100px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:100px;transition:width .4s ease}
.progress-text{font-family:'JetBrains Mono',monospace;font-size:.75rem;color:var(--text3);white-space:nowrap}
.quiz-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:32px;position:relative;overflow:hidden}
.quiz-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--accent),var(--blue),var(--accent))}
.q-category{font-family:'JetBrains Mono',monospace;font-size:.7rem;letter-spacing:.08em;text-transform:uppercase;color:var(--accent2);margin-bottom:12px}
.q-rule-ref{font-family:'JetBrains Mono',monospace;font-size:.72rem;color:var(--text3);margin-bottom:14px;padding:4px 10px;background:var(--surface2);border-radius:6px;display:inline-block}
.q-text{font-size:1.08rem;line-height:1.6;font-weight:500;margin-bottom:24px}
.options{display:grid;gap:10px}
.option{background:var(--surface2);border:1.5px solid var(--border);border-radius:12px;padding:14px 18px;cursor:pointer;transition:all .2s;display:flex;align-items:flex-start;gap:12px;text-align:left;width:100%;font-family:'DM Sans',sans-serif;font-size:.92rem;color:var(--text);line-height:1.5}
.option:hover:not(.locked){border-color:var(--accent);background:var(--accent-glow)}
.option .letter{font-family:'JetBrains Mono',monospace;font-size:.78rem;font-weight:600;color:var(--text3);background:var(--bg);width:28px;height:28px;display:flex;align-items:center;justify-content:center;border-radius:8px;flex-shrink:0;margin-top:1px}
.option.selected{border-color:var(--accent);background:var(--accent-glow)}
.option.selected .letter{background:var(--accent);color:#fff}
.option.correct{border-color:var(--green);background:var(--green-bg)}
.option.correct .letter{background:var(--green);color:#fff}
.option.wrong{border-color:var(--red);background:var(--red-bg)}
.option.wrong .letter{background:var(--red);color:#fff}
.option.locked{cursor:default}
.explanation{margin-top:18px;border-radius:12px;font-size:.88rem;line-height:1.6;animation:slideIn .3s ease;overflow:hidden}
.explanation.correct-exp{background:var(--green-bg);border:1px solid var(--green-border)}
.explanation.wrong-exp{background:var(--red-bg);border:1px solid var(--red-border)}
.exp-header{padding:14px 18px 0;font-weight:700;font-size:.95rem}
.correct-exp .exp-header{color:var(--green)}
.wrong-exp .exp-header{color:var(--red)}
.exp-body{padding:6px 18px 14px;color:var(--text2)}
.correct-exp .exp-body{color:var(--green)}
.exp-correct-ans{margin:0 18px;padding:10px 14px;border-radius:8px;background:var(--green-bg);border:1px solid var(--green-border);color:var(--green);font-size:.84rem;font-weight:600;display:flex;align-items:flex-start;gap:8px}
.exp-correct-ans svg{width:16px;height:16px;fill:var(--green);flex-shrink:0;margin-top:2px}
.rule-cite{margin:14px 18px 18px;padding:14px 16px;border-radius:10px;background:rgba(0,0,0,.25);border:1px solid var(--border)}
.rule-cite-header{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.rule-cite-header svg{width:16px;height:16px;fill:var(--accent2);flex-shrink:0}
.rule-cite-header span{font-family:'JetBrains Mono',monospace;font-size:.72rem;color:var(--accent2);font-weight:600;letter-spacing:.05em;text-transform:uppercase}
.rule-cite-rule{font-family:'JetBrains Mono',monospace;font-size:.82rem;font-weight:700;color:var(--text);margin-bottom:2px}
.rule-cite-headline{font-size:.82rem;color:var(--yellow);font-weight:600;margin-bottom:10px;font-style:italic}
.rule-cite-text{font-size:.82rem;color:var(--text2);line-height:1.6;border-left:3px solid var(--accent);padding-left:12px;margin-bottom:10px}
.rule-cite-penalty{display:inline-flex;align-items:center;gap:6px;font-family:'JetBrains Mono',monospace;font-size:.72rem;font-weight:600;padding:4px 10px;border-radius:6px;background:rgba(239,68,68,.1);color:var(--red);border:1px solid var(--red-border)}
.rule-cite-penalty.warn{background:rgba(234,179,8,.1);color:var(--yellow);border-color:rgba(234,179,8,.3)}
.rule-cite-penalty.info{background:var(--blue-bg);color:var(--blue);border-color:rgba(59,130,246,.3)}
@keyframes slideIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.results{text-align:center;padding:20px 0}
.score-ring{width:180px;height:180px;margin:0 auto 24px;position:relative}
.score-ring svg{width:100%;height:100%;transform:rotate(-90deg)}
.score-ring circle{fill:none;stroke-width:8;stroke-linecap:round}
.score-ring .bg{stroke:var(--surface2)}
.score-ring .fg{transition:stroke-dashoffset 1.5s ease}
.score-pct{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.score-pct .num{font-family:'Archivo Black',sans-serif;font-size:2.8rem;line-height:1}
.score-pct .label{font-size:.78rem;color:var(--text3);margin-top:2px}
.results h2{font-family:'Archivo Black',sans-serif;font-size:1.5rem;margin-bottom:8px}
.stat-row{display:flex;gap:16px;justify-content:center;margin:24px 0;flex-wrap:wrap}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px 22px;min-width:110px}
.stat .val{font-family:'Archivo Black',sans-serif;font-size:1.4rem}
.stat .lbl{font-size:.72rem;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-top:2px}
.stat.green .val{color:var(--green)}.stat.red .val{color:var(--red)}
.review-item{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:18px 20px;margin-bottom:10px;text-align:left}
.review-item .ri-head{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.review-item .ri-icon{width:24px;height:24px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:.8rem;flex-shrink:0;background:var(--red-bg);color:var(--red)}
.review-item .ri-q{font-weight:600;font-size:.88rem;line-height:1.4}
.review-item .ri-detail{font-size:.82rem;color:var(--text2);line-height:1.5;margin-top:6px}
.review-item .ri-cite{margin-top:10px;padding:12px 14px;border-radius:8px;background:rgba(0,0,0,.2);border:1px solid var(--border)}
.review-item .ri-cite-label{font-family:'JetBrains Mono',monospace;font-size:.7rem;color:var(--accent2);font-weight:600;letter-spacing:.04em;text-transform:uppercase;margin-bottom:2px}
.review-item .ri-cite-hl{font-size:.78rem;color:var(--yellow);font-weight:600;font-style:italic;margin-bottom:6px}
.review-item .ri-cite-text{font-size:.78rem;color:var(--text3);line-height:1.5;border-left:2px solid var(--accent);padding-left:10px;margin-bottom:6px}
.review-item .ri-cite-pen{font-family:'JetBrains Mono',monospace;font-size:.68rem;color:var(--red);font-weight:600}
.review-toggle{margin:20px 0 12px;font-size:.85rem;color:var(--accent2);cursor:pointer;font-weight:600}
.review-toggle:hover{text-decoration:underline}
.diff-badge{display:inline-flex;padding:3px 8px;border-radius:5px;font-size:.68rem;font-weight:600;letter-spacing:.04em;text-transform:uppercase;margin-left:8px}
.diff-badge.easy{background:rgba(34,197,94,.12);color:var(--green)}
.diff-badge.medium{background:rgba(234,179,8,.12);color:var(--yellow)}
.diff-badge.hard{background:rgba(239,68,68,.12);color:var(--red)}
.hidden{display:none!important}
.fade-in{animation:fadeIn .35s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@media(max-width:600px){.quiz-card{padding:22px 18px}.cat-card .q-count{position:static;transform:none;margin-top:8px}.stat-row{gap:10px}.stat{min-width:90px;padding:10px 14px}.rule-cite{margin:14px 12px 14px}.exp-correct-ans{margin:0 12px}.exp-header,.exp-body{padding-left:14px;padding-right:14px}}
</style>
</head>
<body>
<div class="noise"></div>
<div class="app" id="app"></div>
<script>
const Q=[
{cat:"introduction",catLabel:"Introduction",rule:"Section 1.4.3",ruleId:"Section 1.4.3",headline:"Coopertition\u00ae",ruleText:"At FIRST, Coopertition is displaying unqualified kindness and respect in the face of fierce competition. Coopertition is founded on the concept and philosophy that teams can and should help and cooperate with one another even as they compete.",penalty:"N/A \u2014 Core Value, not a penalized rule",penType:"info",q:"What is the FIRST definition of Coopertition\u00ae?",options:["Winning at all costs while appearing professional","Displaying unqualified kindness and respect in the face of fierce competition","Cooperating only with alliance partners during matches","Sharing robot designs with every team at an event"],answer:1,explain:"Coopertition\u00ae is displaying unqualified kindness and respect in the face of fierce competition \u2014 teams help each other even as they compete.",wrongExp:"Coopertition is not about winning at all costs, nor is it limited to alliance partners. The manual defines it specifically as a philosophy of helping and cooperating even while competing fiercely.",diff:"easy"},
{cat:"introduction",catLabel:"Introduction",rule:"Section 1.6",ruleId:"Section 1.6",headline:"This Document & Its Conventions",ruleText:"Key words that have a particular meaning within the context of the FIRST Robotics Competition and REBUILT are defined in the Glossary and indicated in ALL CAPS throughout this document.",penalty:"N/A \u2014 Document convention",penType:"info",q:"In the game manual, what does ALL CAPS text signify?",options:["Warnings about safety hazards","Key words defined in the Glossary with a specific meaning in the FRC context","Rules that carry a RED CARD penalty","Names of sections within the manual"],answer:1,explain:"ALL CAPS words are key terms defined in the Glossary with specific FRC/REBUILT meanings.",wrongExp:"ALL CAPS is not about penalty severity or section names. The manual uses this convention exclusively to indicate terms with precise definitions listed in the Glossary \u2014 words like ROBOT, MATCH, BUMPER, FIELD, etc.",diff:"easy"},
{cat:"introduction",catLabel:"Introduction",rule:"Section 1.6",ruleId:"Section 1.6",headline:"Blue Boxes",ruleText:"While blue boxes are part of the manual, they do not carry the weight of the actual rule (if there is an inadvertent conflict between a rule and its blue box, the rule supersedes the language in the blue box).",penalty:"N/A \u2014 Document convention",penType:"info",q:"If there is a conflict between a rule and its blue box explanation, which takes precedence?",options:["The blue box, as it provides the most recent clarification","Whichever interpretation benefits the team","The rule supersedes the blue box language","They are weighted equally and the referee decides"],answer:2,explain:"The rule always supersedes the blue box if there\u2019s a conflict.",wrongExp:"Blue boxes provide helpful context, examples, and insight, but they do not carry the weight of the actual rule. If there is any conflict between the rule text and its blue box, the rule language is the ultimate authority.",diff:"medium"},
{cat:"introduction",catLabel:"Introduction",rule:"Section 1.8",ruleId:"Section 1.8",headline:"Team Updates",ruleText:"Team Updates are used to notify the FIRST Robotics Competition community of revisions to the official season documentation (e.g. the manual, drawings, etc.) or important season news. Team Updates are posted on the Season Materials webpage and are generally posted before 5 pm, Eastern.",penalty:"N/A \u2014 Informational",penType:"info",q:"How are revisions to official season documentation communicated to the FRC community?",options:["Through the Q&A System only","Via email directly to all registered teams","Through Team Updates posted on the Season Materials webpage","By editing the game manual PDF without notification"],answer:2,explain:"Team Updates are posted on the Season Materials webpage, generally before 5 PM Eastern, on a regular Tuesday/Friday schedule.",wrongExp:"The Q&A system is for clarifications, not announcing revisions. FIRST does not email teams directly for rule changes, nor does it silently edit the PDF. The official channel is Team Updates, posted on a defined schedule.",diff:"easy"},
{cat:"introduction",catLabel:"Introduction",rule:"Section 1.9",ruleId:"Section 1.9",headline:"Question and Answer System",ruleText:"The Q&A is not a resource for firm predictions on how a situation will play out at an event. Questions about rulings on vague situations, challenging decisions made at past events, or design reviews of a ROBOT system for legality will not be addressed.",penalty:"N/A \u2014 Informational",penType:"info",q:"Which of the following questions would likely NOT be answered in the Q&A system?",options:["How does Rule G418 apply if blue Robot A pins red Robot B against the TOWER?","Is this specific part/design legal?","If a ROBOT does action X, does it meet the definition of a specific game term?","How does Rule R105 interact with R106 regarding extensions?"],answer:1,explain:"The Q&A explicitly will not answer \u201cIs this part/design legal?\u201d \u2014 those are considered weak questions that amount to design reviews.",wrongExp:"The manual explicitly lists \u201cdesign reviews of a ROBOT system for legality\u201d as a type of question the Q&A will not address. Good questions ask generically about features of parts or rules \u2014 they don\u2019t ask the Q&A to validate a specific design.",diff:"medium"},
{cat:"introduction",catLabel:"Introduction",rule:"Section 1.6",ruleId:"Section 1.6",headline:"Imperial vs Metric Dimensions",ruleText:"The metric conversions are offered for convenient reference only and do not overrule or take the place of the imperial dimensions presented in this manual and the official drawings (i.e. dimensions and rules will always defer to measurements using imperial units).",penalty:"N/A \u2014 Document convention",penType:"info",q:"When a rule specifies dimensions in both imperial and metric, and there is a discrepancy, which unit takes precedence?",options:["Metric, as it is more precise","Imperial, as stated in the manual","Whichever is more restrictive","Teams may use either measurement system"],answer:1,explain:"Imperial units always take precedence. Metric is provided only for convenient reference.",wrongExp:"The manual is unambiguous: imperial dimensions are the official measurements. Metric conversions are rounded for convenience and do not overrule or replace the imperial values. Teams must always defer to imperial units.",diff:"medium"},
{cat:"introduction",catLabel:"Introduction",rule:"Section 1.6",ruleId:"Section 1.6",headline:"Rule Numbering Method",ruleText:"The letter indicates the section in which the rule is published: G for 7 Game Rules, R for 8 ROBOT Construction Rules, I for 9 Inspection & Eligibility, T for 10 Tournaments, C for 13 FIRST Championship Tournament, E for 14 Event Rules.",penalty:"N/A \u2014 Document convention",penType:"info",q:"What does the letter prefix in a rule number indicate (e.g., the \u2018G\u2019 in G101)?",options:["The severity level of the penalty","The section of the manual in which the rule is published","Whether the rule is evergreen or season-specific","The subsystem of the robot it applies to"],answer:1,explain:"The letter indicates the manual section: G = Game Rules, R = Robot Construction, I = Inspection, T = Tournaments, C = Championship, E = Event Rules.",wrongExp:"The letter prefix has nothing to do with penalty severity, evergreen status, or robot subsystems. Evergreen rules are indicated by a leading asterisk (*) and bold green text, which is a separate convention entirely.",diff:"easy"},
{cat:"introduction",catLabel:"Introduction",rule:"Section 1.4.2",ruleId:"Section 1.4.2",headline:"Gracious Professionalism\u00ae",ruleText:"Gracious Professionalism is not clearly defined for a reason. It is an aspirational ideal to always strive towards, not a goal to be achieved or a method of measuring someone, and for this reason, you can never say someone \u2018is\u2019 or \u2018is not\u2019 being Graciously Professional.",penalty:"N/A \u2014 Core Value",penType:"info",q:"Which statement best describes Gracious Professionalism\u00ae?",options:["A strictly defined code of conduct with measurable criteria","An aspirational ideal that encourages high quality work and respect for others","A scoring metric used by judges for awards","A rule that penalizes teams for unsportsmanlike behavior"],answer:1,explain:"It is deliberately not clearly defined \u2014 an aspirational ideal to strive towards, not a measurable standard.",wrongExp:"The manual explicitly states Gracious Professionalism is \u2018not clearly defined for a reason.\u2019 It is not a scoring metric, not a penalty mechanism, and has no measurable criteria. It is an aspirational philosophy of doing high-quality work while valuing others.",diff:"easy"},
{cat:"matchplay",catLabel:"Match Play & Safety",rule:"G101",ruleId:"G101",headline:"Humans, remain outside the FIELD",ruleText:"A team member may not reach into the FIELD with any part of their body during a MATCH. Violations of this rule apply to the entire team, not specifically to any 1 individual.",penalty:"VERBAL WARNING. YELLOW CARD if subsequent violations during the event.",penType:"warn",q:"What happens if a team member reaches into the FIELD during a MATCH for the first time at an event?",options:["MINOR FOUL","YELLOW CARD immediately","VERBAL WARNING (YELLOW CARD for subsequent violations)","RED CARD"],answer:2,explain:"First violation is a VERBAL WARNING; subsequent violations escalate to YELLOW CARD. Violations apply to the entire team.",wrongExp:"This rule uses an escalating penalty structure: VERBAL WARNING first, YELLOW CARD for repeats. It is NOT a FOUL or immediate CARD. Importantly, violations are tracked per team, not per individual \u2014 a different person repeating the violation still counts as \u2018subsequent.\u2019",diff:"easy"},
{cat:"matchplay",catLabel:"Match Play & Safety",rule:"G102",ruleId:"G102",headline:"Never step over the guardrail",ruleText:"A team member may only enter or exit the FIELD through open gates and only enter if FIELD lighting (FIELD facing side of the team signs and timers) is green, unless explicitly instructed by a REFEREE or an FTA.",penalty:"VERBAL WARNING. YELLOW CARD if subsequent violations during the event.",penType:"warn",q:"How may a team member enter or exit the FIELD?",options:["Over the guardrail if done safely","Only through open gates when FIELD lighting is green, or when instructed by a REFEREE or FTA","Through any available opening at any time","Only when escorted by a FIELD STAFF member"],answer:1,explain:"Only through open gates when FIELD lighting is green, or when explicitly instructed by a REFEREE or FTA.",wrongExp:"Stepping over the guardrail is never permitted \u2014 it creates injury risk. The rule requires two conditions: using open gates AND green field lighting. The only override is explicit instruction from a REFEREE or FTA.",diff:"easy"},
{cat:"matchplay",catLabel:"Match Play & Safety",rule:"G104",ruleId:"G104",headline:"Teams may not enable their ROBOTS on the FIELD",ruleText:"Teams may not tether to the ROBOT while on the FIELD except in special circumstances (e.g. after Opening Ceremonies, before an immediate MATCH replay, etc.) and with the express permission from the FTA or a REFEREE.",penalty:"VERBAL WARNING. YELLOW CARD if subsequent violations during the event.",penType:"warn",q:"Under what circumstances may a team tether to their ROBOT while on the FIELD?",options:["Anytime before the MATCH starts","Only in special circumstances (e.g. after Opening Ceremonies) with express permission from the FTA or REFEREE","Never \u2014 tethering on the FIELD is always prohibited","Whenever the ROBOT needs a firmware update"],answer:1,explain:"Tethering is prohibited except in special circumstances with express permission from the FTA or REFEREE.",wrongExp:"Tethering is not always prohibited \u2014 there are specific exceptions \u2014 but it is also not freely permitted before matches. The key requirement is \u2018express permission from the FTA or a REFEREE\u2019 during defined special circumstances. FMS will not enable ROBOTS after match conclusion.",diff:"medium"},
{cat:"matchplay",catLabel:"Match Play & Safety",rule:"G209",ruleId:"G209",headline:"Keep your ROBOT together",ruleText:"A ROBOT may not intentionally detach or leave a part on the FIELD.",penalty:"RED CARD",penType:"red",q:"What is the penalty if a ROBOT intentionally detaches or leaves a part on the FIELD?",options:["MINOR FOUL","MAJOR FOUL","YELLOW CARD","RED CARD"],answer:3,explain:"G209 is one of the harshest penalties \u2014 an immediate RED CARD for intentionally leaving parts on the FIELD.",wrongExp:"This is one of the most severe penalties in the manual. The violation is not a FOUL or YELLOW CARD \u2014 it is an immediate RED CARD. The word \u2018intentionally\u2019 is key: accidental breakage addressed by other rules (like G409) has different penalties.",diff:"easy"},
{cat:"matchplay",catLabel:"Match Play & Safety",rule:"G203 / G204",ruleId:"G203 & G204",headline:"Asking/letting teams throw a MATCH",ruleText:"G203: A team may not encourage an ALLIANCE of which it is not a member to play beneath its ability. G204: A team, as the result of encouragement by a team not on their ALLIANCE, may not play beneath its ability.",penalty:"VERBAL WARNING. RED CARD if subsequent violations during the event.",penType:"red",q:"Team D asks Team C (not on Team D\u2019s alliance) to deliberately avoid scoring in an upcoming match. Which teams have violated the rules?",options:["Only Team D","Only Team C if they comply","Both Team D (for asking) and Team C (if they comply)","Neither \u2014 this is considered strategy"],answer:2,explain:"G203 penalizes Team D for asking; G204 penalizes Team C if they comply. Both are in violation.",wrongExp:"These are companion rules that create a two-sided prohibition. G203 targets the team doing the asking \u2014 they violated the rule the moment they made the request. G204 targets the team that complies. FIRST considers influencing another team to throw a MATCH incompatible with FIRST values.",diff:"medium"},
{cat:"matchplay",catLabel:"Match Play & Safety",rule:"G301",ruleId:"G301",headline:"Be prompt",ruleText:"A DRIVE TEAM member may not cause significant delays to the start of their MATCH. Causing a significant delay requires both: A. The expected MATCH start time has passed, AND B. The DRIVE TEAM has access to the FIELD and is neither MATCH ready nor making a good faith effort to quickly become MATCH ready.",penalty:"Qualification: VERBAL WARNING \u2192 MAJOR FOUL \u2192 DISABLED (if not ready in 2 min). Playoff: same escalation.",penType:"warn",q:"What must be true for a team to be in violation of \u2018Be prompt\u2019 (G301) for delaying match start?",options:["The team\u2019s robot isn\u2019t on the field","Both: the expected MATCH start time has passed, AND the DRIVE TEAM isn\u2019t MATCH ready nor making a good faith effort","The team hasn\u2019t finished their autonomous code","Any team member is late to the field"],answer:1,explain:"BOTH conditions must be true: start time passed AND no good-faith effort to become MATCH ready.",wrongExp:"A robot not being on the field alone is not sufficient \u2014 the rule requires a compound condition. Both the timing threshold (expected start time passed) AND the readiness/effort threshold (not MATCH ready, not trying) must be met simultaneously. Good faith efforts like walking to the field or quick fixes prevent violation.",diff:"hard"},
{cat:"matchplay",catLabel:"Match Play & Safety",rule:"G302",ruleId:"G302",headline:"Limit what you use during a MATCH",ruleText:"Items used during a match must fit on your team\u2019s DRIVER STATION shelf, be worn or held by DRIVE TEAM members, or be accommodation items. Equipment may not extend more than 78.0in (1.981m) above the floor.",penalty:"MATCH will not start until remedied. YELLOW CARD if discovered during MATCH.",penType:"yellow",q:"What is the maximum height that items used by a DRIVE TEAM during a MATCH may extend above the floor?",options:["60.0 inches","72.0 inches","78.0 inches (with momentary exceptions)","No height restriction"],answer:2,explain:"78.0 inches with exceptions for momentary extensions and individuals taller than 78 inches wearing PPE or hats.",wrongExp:"The specific limit is 78.0 inches (1.981m). There are narrow exceptions for momentary extensions and for people naturally taller than 78 inches wearing reasonable headwear. Equipment also may not communicate outside the ARENA, block visibility, or interfere with remote sensing.",diff:"medium"},
{cat:"matchplay",catLabel:"Match Play & Safety",rule:"G401",ruleId:"G401",headline:"Behind the lines",ruleText:"In AUTO, each DRIVE TEAM member must remain in their staged areas. A DRIVE TEAM member staged behind a HUMAN STARTING LINE may not contact anything in front of that line, unless for personal or equipment safety, to press the E-Stop or A-Stop, or granted permission by a Head REFEREE or FTA.",penalty:"MINOR FOUL regardless of the number of items contacted.",penType:"foul",q:"During the AUTO period, what happens if a DRIVE TEAM member contacts something in front of the HUMAN STARTING LINE?",options:["VERBAL WARNING","MINOR FOUL regardless of the number of items contacted","MAJOR FOUL","No penalty if it was accidental"],answer:1,explain:"MINOR FOUL is assessed regardless of how many items are contacted. Exceptions for safety and E-Stop/A-Stop use.",wrongExp:"This is a strict liability rule during AUTO \u2014 intent doesn\u2019t matter and there\u2019s no warning. Contact with anything in front of the line is a MINOR FOUL. Pointing or gesturing without making contact is not a violation. The only exceptions are for safety, pressing E-Stop/A-Stop, or REFEREE/FTA permission.",diff:"medium"},
{cat:"matchplay",catLabel:"Match Play & Safety",rule:"G418",ruleId:"G418",headline:"There\u2019s a 3-count on PINS",ruleText:"A ROBOT may not PIN an opponent\u2019s ROBOT for more than 3 seconds. A ROBOT is PINNING if it is preventing the movement of an opponent ROBOT by contact, either direct or transitive (such as against a FIELD element).",penalty:"MINOR FOUL, and for every 3 seconds not corrected, a MAJOR FOUL.",penType:"foul",q:"How long may a ROBOT PIN an opponent before receiving a penalty?",options:["5 seconds","3 seconds","10 seconds","There is no time limit on PINS"],answer:1,explain:"3-second limit. After that, MINOR FOUL plus MAJOR FOUL every additional 3 seconds.",wrongExp:"The PIN limit is exactly 3 seconds, not 5 or 10. After 3 seconds it\u2019s a MINOR FOUL, and every additional 3 seconds adds a MAJOR FOUL. A team\u2019s desired direction of travel is not a consideration when determining if a ROBOT is PINNED.",diff:"easy"},
{cat:"matchplay",catLabel:"Match Play & Safety",rule:"G418",ruleId:"G418",headline:"PIN separation distance",ruleText:"A PIN count ends once: A. the ROBOTS have separated by at least 72.0in (1.83m) from each other for more than 3 seconds, B. either ROBOT has moved 72.0in (1.83m) from where the PIN initiated for more than 3 seconds, or C. the PINNING ROBOT gets PINNED.",penalty:"MINOR FOUL, plus MAJOR FOUL for every 3 seconds not corrected.",penType:"foul",q:"What is the minimum separation distance required to end a PIN count per G418?",options:["36.0 inches","48.0 inches","72.0 inches (1.83m)","96.0 inches"],answer:2,explain:"72.0 inches (1.83m) separation for more than 3 seconds, or either robot moving 72.0 inches from the PIN initiation point.",wrongExp:"The distance is exactly 72.0 inches (1.83m) \u2014 roughly 6 feet. This separation must be maintained for more than 3 seconds. If the PINNING robot moves back within 72.0 inches, the PIN count resumes from where it paused, not from zero.",diff:"hard"},
{cat:"matchplay",catLabel:"Match Play & Safety",rule:"G416",ruleId:"G416",headline:"This isn\u2019t combat robotics",ruleText:"A ROBOT may not damage or functionally impair an opponent ROBOT deliberately, or regardless of intent, by initiating contact inside the vertical projection of an opponent\u2019s ROBOT PERIMETER, or with the opponent\u2019s BUMPER backing or mounting.",penalty:"MAJOR FOUL and YELLOW CARD; if opponent unable to drive: MAJOR FOUL and RED CARD.",penType:"red",q:"What is the penalty for damaging an opponent ROBOT such that it is unable to drive?",options:["MINOR FOUL and YELLOW CARD","MAJOR FOUL and YELLOW CARD","MAJOR FOUL and RED CARD","Immediate DISQUALIFICATION"],answer:2,explain:"If the opponent is unable to drive: MAJOR FOUL and RED CARD.",wrongExp:"The penalty escalates based on outcome. Standard damage is MAJOR FOUL + YELLOW CARD, but when the opponent becomes unable to drive, it escalates to MAJOR FOUL + RED CARD. \u2018Unable to drive\u2019 means the DRIVER can no longer reach a desired location in reasonable time \u2014 including only moving in circles or extremely slowly.",diff:"medium"},
{cat:"matchplay",catLabel:"Match Play & Safety",rule:"G420",ruleId:"G420",headline:"TOWER protection",ruleText:"A ROBOT may not contact, directly or transitively through a SCORING ELEMENT, an opponent ROBOT in contact with an opponent TOWER during the last 30 seconds of the MATCH regardless of who initiates contact.",penalty:"MAJOR FOUL; if opponent is off the ground, opponent awarded LEVEL 3 TOWER points.",penType:"foul",q:"During what portion of the MATCH does TOWER protection (G420) apply?",options:["The entire MATCH","Only during AUTO","The last 30 seconds of the MATCH","The last 60 seconds of the MATCH"],answer:2,explain:"TOWER protection applies during the last 30 seconds, regardless of who initiates contact.",wrongExp:"TOWER protection is specifically limited to the last 30 seconds of the MATCH \u2014 not the entire match, not just AUTO, and not the last 60 seconds. This is a strict rule: it applies regardless of who initiates contact, protecting robots attempting to climb at the end of the match.",diff:"medium"},
{cat:"matchplay",catLabel:"Match Play & Safety",rule:"G419",ruleId:"G419",headline:"Don\u2019t collude with partners to shut down gameplay",ruleText:"2 or more ROBOTS that appear to a REFEREE to be working together may not isolate or close off any major element of MATCH play.",penalty:"MAJOR FOUL, and for every 3 seconds not corrected, a MAJOR FOUL.",penType:"foul",q:"What does G419 prohibit regarding defensive play?",options:["Any form of defense during the match","A single robot blocking an area of the field","Two or more robots working together to isolate or close off any major element of MATCH play","Pushing an opponent robot"],answer:2,explain:"Two or more robots may not work together to close off major gameplay elements. A single robot blocking an area is standard gameplay.",wrongExp:"Defense itself is legal \u2014 the rule specifically targets coordinated shutdowns by 2+ robots. A single ROBOT blocking access to a field area is explicitly listed as standard gameplay and NOT a violation. Examples of violations include shutting down access to all SCORING ELEMENTS, quarantining opponents, or blocking both TRENCHES.",diff:"medium"},
{cat:"matchplay",catLabel:"Match Play & Safety",rule:"G211",ruleId:"G211",headline:"Egregious or exceptional violations",ruleText:"Egregious behavior beyond what is listed in the rules or subsequent violations of any rule or procedure during the event is prohibited. The Head REFEREE may assign a YELLOW or RED CARD for egregious ROBOT actions or team member behavior at any time during the event.",penalty:"YELLOW or RED CARD at Head REFEREE\u2019s discretion.",penType:"red",q:"Who has the authority to assign a YELLOW or RED CARD for behavior not explicitly listed in the rules?",options:["Any REFEREE on the field","The FTA only","The Head REFEREE","FIRST Headquarters only"],answer:2,explain:"The Head REFEREE has this authority and may exercise it at any time during the event.",wrongExp:"Only the Head REFEREE holds this authority \u2014 not any referee, not the FTA alone, and not FIRST Headquarters (though HQ has separate authority for event-level replays). This rule gives the Head REFEREE flexibility to address safety concerns and behaviors not specifically covered by other rules.",diff:"easy"},
{cat:"safety",catLabel:"Safety & Event Etiquette",rule:"E101",ruleId:"E101",headline:"Personal safety comes first",ruleText:"All team members must wear safety glasses (only ANSI-approved, UL Listed, CE EN166 rated, AS/NZS certified, or CSA rated non-shaded) while in and around the playing FIELD and in the pit area. Lightly tinted lenses are permitted provided eyes are clearly visible; reflective lenses are prohibited.",penalty:"VERBAL WARNING; egregious/subsequent addressed by Head REFEREE, LRI, and/or Event Management.",penType:"warn",q:"What type of safety glasses are required at FRC events?",options:["Any glasses with lenses","ANSI-approved, UL Listed, CE EN166, AS/NZS certified, or CSA rated \u2014 non-shaded","Prescription glasses count as safety glasses","Only splash-proof chemistry goggles"],answer:1,explain:"Must be ANSI-approved, UL Listed, CE EN166, AS/NZS, or CSA rated and non-shaded. Light tints OK if eyes visible.",wrongExp:"Regular prescription glasses, chemistry goggles, and random sunglasses do not meet the requirement. The manual specifies exact certification standards (ANSI, UL, CE EN166, AS/NZS, CSA) and prohibits reflective lenses.",diff:"easy"},
{cat:"safety",catLabel:"Safety & Event Etiquette",rule:"E101",ruleId:"E101",headline:"Safety glasses exemption window",ruleText:"The only exception is for teams in their first 10 minutes of their load in and for the first 10 minutes pits are open each day of the event as long as they\u2019re not working on the ROBOT or setting up their pit.",penalty:"VERBAL WARNING; egregious/subsequent escalation.",penType:"warn",q:"When are teams exempt from wearing safety glasses during an event?",options:["When in the stands watching matches","During the first 10 minutes of load-in AND the first 10 minutes pits open each day (if not working on robot)","During lunch breaks in the pit area","Anytime they are not actively working on their robot"],answer:1,explain:"Exemption only during the first 10 minutes of load-in and first 10 minutes pits open each day, if not working on robot.",wrongExp:"There is no general exemption for lunch breaks, being in stands, or not actively working. The exemption is narrowly defined: first 10 minutes of load-in AND first 10 minutes pits open each day \u2014 and only if you\u2019re not working on the ROBOT or setting up your pit.",diff:"hard"},
{cat:"safety",catLabel:"Safety & Event Etiquette",rule:"E103",ruleId:"E103",headline:"Children with adults, please",ruleText:"Children under 12 must be accompanied in the pits by an adult at all times.",penalty:"VERBAL WARNING; egregious/subsequent escalation.",penType:"warn",q:"What is the age requirement for children to be accompanied by an adult in the pits?",options:["Under 16","Under 14","Under 12","Under 18"],answer:2,explain:"Children under 12 must be accompanied by an adult at all times in the pits.",wrongExp:"The threshold is specifically under 12, not 14, 16, or 18. FRC team members ages 14-18 are expected to be in the pits as part of their team activities. This rule protects younger visitors.",diff:"easy"},
{cat:"safety",catLabel:"Safety & Event Etiquette",rule:"E108",ruleId:"E108",headline:"Some things don\u2019t belong at events",ruleText:"Do not bring or use: A. skateboards, B. \u2018hoverboards\u2019, C. drones, D. bottled gas tanks, E. noisy devices or noisemakers, F. walkie-talkies, G. scooters (except accommodations), H. items with bright lights flashing faster than ~5 times per second.",penalty:"VERBAL WARNING; egregious/subsequent escalation.",penType:"warn",q:"Which of the following items is NOT prohibited at FRC events?",options:["Drones","Walkie-talkies","Folding work tables","Hoverboards"],answer:2,explain:"E108 prohibits drones, walkie-talkies, hoverboards, and others. Folding work tables are not on the list.",wrongExp:"E108 provides an explicit list of prohibited items including skateboards, hoverboards, drones, bottled gas tanks, noisemakers, walkie-talkies, non-accommodation scooters, and fast-flashing lights. Folding work tables are not on this list.",diff:"easy"},
{cat:"safety",catLabel:"Safety & Event Etiquette",rule:"E110 / E111",ruleId:"E110 & E111",headline:"No sales or food distribution",ruleText:"E110: Teams may not conduct sales at an event (including raffle tickets, food, shirts, candy, water, or any promotional products). E111: Teams may not distribute food to others at an event.",penalty:"VERBAL WARNING; egregious/subsequent escalation.",penType:"warn",q:"Are teams allowed to sell items or distribute food at events?",options:["Yes, both are permitted for fundraising","Sales are prohibited, but distributing food is allowed","Both conducting sales and distributing food to others are prohibited","Only food distribution is prohibited"],answer:2,explain:"Both are prohibited. E110 bans all sales, E111 bans food distribution.",wrongExp:"These are two separate but related rules. E110 covers all sales (including fundraising items like raffle tickets and shirts). E111 separately prohibits distributing food. Even free giveaways of food are not permitted.",diff:"easy"},
{cat:"safety",catLabel:"Safety & Event Etiquette",rule:"E115",ruleId:"E115",headline:"No firearms",ruleText:"Firearms are prohibited at all FIRST events for all FIRST programs. This policy does not apply to law enforcement or venue security personnel.",penalty:"VERBAL WARNING; egregious/subsequent escalation.",penType:"warn",q:"Are firearms permitted at FIRST events?",options:["Yes, if permitted by local law","Only for adult mentors with permits","No \u2014 firearms are prohibited for all except law enforcement or venue security","Only in locked vehicles in the parking lot"],answer:2,explain:"Firearms prohibited for all participants. Only law enforcement and venue security are exempt.",wrongExp:"This is a blanket prohibition with no exceptions for permits, local laws, or vehicle storage. The only exemption is for law enforcement or venue security personnel actively performing their duties.",diff:"easy"},
{cat:"safety",catLabel:"Safety & Event Etiquette",rule:"E117",ruleId:"E117",headline:"Do not record without consent",ruleText:"Do not record interactions with anyone at an event, without the person\u2019s consent. FIRST event staff and volunteers are empowered to excuse themselves from an interaction in which they are being recorded after declining consent.",penalty:"VERBAL WARNING; egregious/subsequent escalation.",penType:"warn",q:"What is the policy on recording interactions at events?",options:["All recording is permitted since events are public","You may not record interactions with anyone without their consent","Only video is restricted; audio recording is fine","Recording is only prohibited in the pit area"],answer:1,explain:"You may not record interactions without consent. Volunteers may excuse themselves from recorded interactions.",wrongExp:"Events being public or livestreamed does not grant blanket recording permission. The rule requires consent for recording specific interactions with individuals. Laws regarding recording vary by jurisdiction, and recording without consent may even be criminal in some locations.",diff:"medium"},
{cat:"safety",catLabel:"Safety & Event Etiquette",rule:"E504 / E506 / E507",ruleId:"E504, E506, E507",headline:"Fabrication safety restrictions in pits",ruleText:"E504: Tools that throw sparks or produce open flames are prohibited. E506: Brazing/welding is prohibited. E507: Soldering may be done using an electric iron/gun only.",penalty:"Teams asked to remove prohibited tools.",penType:"warn",q:"Which of the following fabrication activities is permitted in the pit area?",options:["Using a MIG welder for aluminum","Using an angle grinder to cut metal","Soldering with an electric iron","Using a gas torch for brazing"],answer:2,explain:"Only electric soldering irons/guns are permitted. Welding, brazing, grinders, and open flames are prohibited.",wrongExp:"Three separate rules create a clear hierarchy: E504 prohibits spark-throwing and flame-producing tools (eliminates grinders and torches), E506 prohibits all brazing/welding (eliminates MIG welders), and E507 limits soldering to electric irons/guns only.",diff:"medium"},
{cat:"safety",catLabel:"Safety & Event Etiquette",rule:"E301",ruleId:"E301",headline:"No wireless communication",ruleText:"Teams may not set up their own 802.11a/b/g/n/ac/ax/be wireless communication (e.g. access points or ad-hoc networks) in the venue. A wireless hot spot created by a cellular device, camera, smart TV, etc. is considered an access point.",penalty:"VERBAL WARNING; subsequent violations may lead to dismissal and/or legal action.",penType:"red",q:"What wireless communication restriction applies to teams at events?",options:["Teams may use Bluetooth but not WiFi","Teams may not set up any 802.11 wireless communication in the venue","Teams may use 5GHz WiFi but not 2.4GHz","Wireless is unrestricted in the pit area"],answer:1,explain:"All 802.11 wireless communication is prohibited, including cellular hotspots which create access points.",wrongExp:"The prohibition covers all 802.11 standards (a/b/g/n/ac/ax/be) \u2014 no frequency band exceptions. A cellular hotspot counts as an access point. Even smart TVs with factory-default access points must have that functionality disabled. Subsequent violations can lead to dismissal or legal action.",diff:"medium"},
{cat:"safety",catLabel:"Safety & Event Etiquette",rule:"E402",ruleId:"E402",headline:"Load-In person limit is 6",ruleText:"Only 6 team members (one of which must be an adult) may be in the pit area during any Load-In period prior to pits opening.",penalty:"Extra team members must leave the venue.",penType:"warn",q:"How many team members are allowed in the pit area during Load-In before pits open?",options:["3 (one must be an adult)","4 (one must be an adult)","6 (one must be an adult)","Unlimited"],answer:2,explain:"Maximum 6 team members, at least one of whom must be an adult.",wrongExp:"The specific limit is 6 team members, with the requirement that at least one must be an adult. Extra team members who exceed this limit must leave the venue entirely, not just the pit area.",diff:"medium"},
{cat:"robot",catLabel:"Robot Construction & Inspection",rule:"R103",ruleId:"R103",headline:"ROBOT weight limit",ruleText:"The ROBOT weight must not exceed 115.0lb (52.16kg). Excluded from weighing: A. BUMPERS, B. battery and its Anderson cable assembly, C. event-provided location detection tags.",penalty:"Robot will not pass inspection until compliant.",penType:"warn",q:"What is the maximum ROBOT weight (excluding bumpers and battery)?",options:["120.0 lbs","125.0 lbs","115.0 lbs","135.0 lbs"],answer:2,explain:"115.0 lbs, excluding bumpers, battery with Anderson connector, and event-provided location tags.",wrongExp:"The weight limit is exactly 115.0 lbs (52.16 kg). 135.0 lbs is the limit WITH bumpers (R408). The exclusions are specific: BUMPERS, the battery and its Anderson connector assembly, and event-provided location tags.",diff:"easy"},
{cat:"robot",catLabel:"Robot Construction & Inspection",rule:"R408",ruleId:"R408",headline:"Weight limit with BUMPERS",ruleText:"The total weight of the ROBOT (as described in R103) with BUMPERS must not exceed 135.0lb (61.23kg).",penalty:"Robot will not pass inspection until compliant.",penType:"warn",q:"What is the total maximum weight of the ROBOT with BUMPERS attached?",options:["115.0 lbs","125.0 lbs","135.0 lbs","150.0 lbs"],answer:2,explain:"135.0 lbs total with bumpers. This gives teams up to 20 lbs for bumpers.",wrongExp:"115.0 lbs is the robot-only limit (R103). 150.0 lbs is the inspection presentation limit for all mechanisms (I103). The bumpered weight limit is specifically 135.0 lbs, giving teams roughly 20 lbs of bumper weight budget.",diff:"easy"},
{cat:"robot",catLabel:"Robot Construction & Inspection",rule:"R104",ruleId:"R104",headline:"STARTING CONFIGURATION \u2013 max size",ruleText:"A ROBOT\u2019S STARTING CONFIGURATION may not have a ROBOT PERIMETER greater than 110.0in (2.794m) and may not be more than 30in (76.2cm) tall.",penalty:"Robot will not pass inspection until compliant.",penType:"warn",q:"What are the STARTING CONFIGURATION maximum dimensions for a ROBOT?",options:["PERIMETER \u2264 120.0 in, height \u2264 36 in","PERIMETER \u2264 110.0 in, height \u2264 30 in","PERIMETER \u2264 100.0 in, height \u2264 24 in","PERIMETER \u2264 96.0 in, height \u2264 30 in"],answer:1,explain:"ROBOT PERIMETER \u2264 110.0 inches and height \u2264 30 inches in STARTING CONFIGURATION.",wrongExp:"The two constraints are: perimeter no greater than 110.0 inches and height no more than 30 inches. Teams should also consider cart size for fitting through doors and shipping crate dimensions.",diff:"medium"},
{cat:"robot",catLabel:"Robot Construction & Inspection",rule:"R105",ruleId:"R105",headline:"ROBOT horizontal extension limit",ruleText:"ROBOTS may not extend more than 12in (30.48cm) beyond the vertical projection of their ROBOT PERIMETER.",penalty:"Subject to G413 MAJOR FOUL during match.",penType:"foul",q:"How far beyond the ROBOT PERIMETER may a ROBOT extend horizontally during a match?",options:["6 inches","12 inches","18 inches","24 inches"],answer:1,explain:"Maximum 12 inches beyond the ROBOT PERIMETER in any direction.",wrongExp:"The limit is exactly 12 inches (30.48 cm). During matches, violations are penalized under G413 as a MAJOR FOUL. Teams must demonstrate constraint ability during inspection.",diff:"easy"},
{cat:"robot",catLabel:"Robot Construction & Inspection",rule:"R106",ruleId:"R106",headline:"Horizontal extension \u2013 one direction at a time",ruleText:"ROBOTS may not extend beyond their ROBOT PERIMETER in more than one direction (i.e. over more than 1 side of the ROBOT) at a time. The extension may not reach outside the projection of that side of the ROBOT PERIMETER.",penalty:"Subject to G413 MAJOR FOUL during match.",penType:"foul",q:"A ROBOT extends mechanisms beyond its perimeter in two different directions simultaneously. Is this legal?",options:["Yes, as long as each extension is under 12 inches","No \u2014 ROBOTS may only extend beyond their perimeter in one direction at a time","Yes, during the last 30 seconds of the match","Only if the combined extension is under 24 inches"],answer:1,explain:"Only one direction at a time. BUMPERS and minor protrusions are the only exceptions.",wrongExp:"R106 is explicit: extensions limited to one direction at a time, regardless of individual distances. G413 provides a narrow exception for MOMENTARY actions not used for strategic benefit, such as a cable swinging briefly.",diff:"medium"},
{cat:"robot",catLabel:"Robot Construction & Inspection",rule:"R301",ruleId:"R301",headline:"Individual item cost limit",ruleText:"No individual, non-KOP item or software shall have a Fair Market Value (FMV) that exceeds $600 USD. The total cost of COMPONENTS purchased in bulk may exceed $600 USD as long as each individual COMPONENT does not exceed $600 USD.",penalty:"Item is not legal for use on the ROBOT.",penType:"warn",q:"What is the maximum Fair Market Value (FMV) allowed for any single non-KOP item on the ROBOT?",options:["$400 USD","$500 USD","$600 USD","$1,000 USD"],answer:2,explain:"$600 USD per individual item. Bulk totals may exceed $600 if individual components are each under $600.",wrongExp:"The limit is exactly $600 USD per individual item. FMV is the VENDOR price, not including shipping, taxes, or tariffs. If a VENDOR sells a system as a kit that only works in one configuration, the entire kit\u2019s FMV must be under $600.",diff:"easy"},
{cat:"robot",catLabel:"Robot Construction & Inspection",rule:"R401",ruleId:"R401",headline:"BUMPERS almost all around",ruleText:"ROBOTS are required to use BUMPERS to protect the entire ROBOT PERIMETER. Gaps of less than 1.25in (3.17cm) between adjacent segments are permitted as long as all corners are filled per R406. A single gap larger than 1.25in is permitted, with at least 5.0in of perimeter on each side of each corner protected.",penalty:"Robot will not pass inspection until compliant.",penType:"warn",q:"What is the maximum allowable gap between BUMPER segments (excluding the single larger gap)?",options:["0.5 inches","1.25 inches","2.0 inches","3.0 inches"],answer:1,explain:"Standard gaps must be less than 1.25 inches. One single larger gap is allowed with corner coverage requirements.",wrongExp:"R401 allows gaps of less than 1.25 inches between adjacent segments. One single larger gap is permitted, but requires at least 5.0 inches of perimeter protection on each side of each corner. An arc has infinite corners and may not have any gap larger than 1.25 inches.",diff:"medium"},
{cat:"robot",catLabel:"Robot Construction & Inspection",rule:"R405",ruleId:"R405",headline:"BUMPERS interact with BUMPERS",ruleText:"While navigating the FIELD normally, all BUMPERS must have padding supported by backing entirely filling the BUMPER ZONE, a space between 2.5in (6.35cm) and 5.75in (14.61cm) from the floor.",penalty:"Robot will not pass inspection. G409/G410 penalties during match.",penType:"warn",q:"What is the BUMPER ZONE \u2014 the height range where BUMPERS must be located?",options:["1.0 to 4.5 inches from the floor","2.5 to 5.75 inches from the floor","2.0 to 6.0 inches from the floor","3.0 to 7.5 inches from the floor"],answer:1,explain:"The BUMPER ZONE is between 2.5 and 5.75 inches from the floor.",wrongExp:"The BUMPER ZONE is precisely 2.5 to 5.75 inches from the floor. This is relative to whatever surface the ROBOT is currently driving on. BUMPERS leaving this zone due to inadvertent tipping is not a violation, but design-caused departures are penalized under G410.",diff:"hard"},
{cat:"robot",catLabel:"Robot Construction & Inspection",rule:"R412",ruleId:"R412",headline:"Team number on BUMPERS",ruleText:"Team numbers must be displayed in at least 3 locations approximately 90 degrees apart such that an observer can unambiguously tell the team\u2019s number from most points of view, from approximately 720.0in (18.29m). Numbers must be white Arabic numerals at least 3.75in high with 0.5in stroke width.",penalty:"Robot will not pass inspection until compliant.",penType:"warn",q:"How many locations must team numbers appear on BUMPERS?",options:["2 locations, 180\u00b0 apart","At least 3 locations, approximately 90\u00b0 apart","4 locations, one on each side","1 location on each bumper segment"],answer:1,explain:"At least 3 locations, approximately 90\u00b0 apart, readable from ~720 inches (~60 feet) away.",wrongExp:"The requirement is at least 3 locations approximately 90\u00b0 apart. Numbers must be white Arabic numerals at least 3.75 inches high with 0.5 inch stroke width. They must not wrap around sharp corners (<135\u00b0) or split digits ambiguously.",diff:"medium"},
{cat:"robot",catLabel:"Robot Construction & Inspection",rule:"R203",ruleId:"R203",headline:"General safety",ruleText:"ROBOT parts shall not be made from hazardous materials, be unsafe, or interfere with other ROBOTS. Prohibited: hydraulic fluids, mercury switches, voltages >24V, flammable gasses, pyrotechnics, etc. Allowed: lasers classified IEC/EN 60825-1 \u2018Class 1\u2019 or IEC/EN 62471 \u2018Exempt.\u2019",penalty:"Robot will not pass inspection; corrective action required.",penType:"warn",q:"Which of the following is NOT listed as a safety hazard that violates R203?",options:["Lasers classified as IEC/EN 60825-1 \u2018Class 1\u2019","Hydraulic fluids or hydraulic items","Circuitry creating voltages exceeding 24 Volts","Switches containing liquid mercury"],answer:0,explain:"Class 1 lasers are explicitly allowed. All other options are on the prohibited list.",wrongExp:"R203 lists prohibited items including hydraulic fluids/items, mercury switches, and voltages over 24V. However, it carves out a specific exception for IEC/EN 60825-1 \u2018Class 1\u2019 or IEC/EN 62471 \u2018Exempt\u2019 lasers \u2014 these are the only laser types allowed.",diff:"hard"},
{cat:"robot",catLabel:"Robot Construction & Inspection",rule:"I101",ruleId:"I101",headline:"It\u2019s your team\u2019s ROBOT",ruleText:"The ROBOT and its MAJOR MECHANISMS must be built by the FIRST Robotics Competition team. A MAJOR MECHANISM is a group of COMPONENTS/MECHANISMS assembled together to address at least 1 game challenge: ROBOT movement, SCORING ELEMENT manipulation, FIELD element manipulation, or performance of a scorable task.",penalty:"Disqualification from event possible.",penType:"red",q:"What is the definition of a MAJOR MECHANISM?",options:["Any mechanism weighing more than 10 lbs","A group of COMPONENTS assembled to address at least 1 game challenge: movement, scoring element manipulation, field element manipulation, or performance of a scorable task","The drive base and any attached gearboxes","Any mechanism that costs more than $200 in parts"],answer:1,explain:"A MAJOR MECHANISM addresses at least one game challenge. A gearbox alone is generally NOT a major mechanism.",wrongExp:"MAJOR MECHANISM has a precise definition tied to game function, not weight or cost. It must address at least one game challenge. A standalone gearbox or individual component is generally not a MAJOR MECHANISM.",diff:"medium"},
{cat:"robot",catLabel:"Robot Construction & Inspection",rule:"I103",ruleId:"I103",headline:"Bring it all to inspection",ruleText:"At the time of inspection, the ROBOT must be presented with all MECHANISMS, configurations, and decorations that will be used without re-inspection and may not exceed 150.0lb (68.04kg). Note: any single match configuration must still comply with the 115.0 lb R103 limit.",penalty:"Mechanisms not presented must be re-inspected before use (I104).",penType:"warn",q:"What is the maximum weight of all MECHANISMS that can be presented together at inspection?",options:["115.0 lbs","135.0 lbs","150.0 lbs","175.0 lbs"],answer:2,explain:"150.0 lbs at inspection, but any single match configuration must comply with the 115.0 lb R103 limit.",wrongExp:"The inspection weight limit is 150.0 lbs \u2014 higher than the match limit (115.0 lbs per R103) or bumpered limit (135.0 lbs per R408). This allows teams to present interchangeable mechanisms not all used simultaneously.",diff:"hard"},
{cat:"robot",catLabel:"Robot Construction & Inspection",rule:"I107",ruleId:"I107",headline:"No STUDENT, no inspection",ruleText:"At least 1 STUDENT team member must accompany the ROBOT for any inspection efforts.",penalty:"Inspection will not proceed.",penType:"warn",q:"Who must accompany the ROBOT for inspection?",options:["The lead mentor","At least 1 STUDENT team member","The entire drive team","Any adult team member"],answer:1,explain:"At least 1 STUDENT must be present. Exceptions for major conflicts like religious holidays or testing.",wrongExp:"This rule emphasizes student ownership \u2014 it must be a STUDENT, not a mentor or adult. Exceptions are narrow: religious holidays, major testing, or transportation issues. The entire drive team is not required.",diff:"easy"},
{cat:"robot",catLabel:"Robot Construction & Inspection",rule:"R302 / R303",ruleId:"R302 & R303",headline:"MAJOR MECHANISMS from this year / pre-Kickoff designs",ruleText:"R302: MAJOR MECHANISMS created before Kickoff are not permitted. R303: ROBOT software and designs created before Kickoff are only permitted if the source files are available publicly prior to Kickoff.",penalty:"Item/mechanism is not legal for use on the ROBOT.",penType:"warn",q:"A team designed a major scoring mechanism before Kickoff and published the design files publicly. Can they build a copy after Kickoff and use it?",options:["No \u2014 mechanisms designed before Kickoff are always prohibited","Yes \u2014 because the design was made publicly available before Kickoff, they can fabricate a copy after Kickoff","Only if they use different materials","Only if another team also builds one"],answer:1,explain:"R303 permits pre-Kickoff designs if source files are publicly available. R302 requires the physical mechanism be fabricated after Kickoff.",wrongExp:"R302 and R303 work together: R302 requires MAJOR MECHANISMS be physically built after Kickoff, but R303 allows pre-Kickoff designs/software IF source files are publicly available before Kickoff. The key distinction is between designs (can be pre-made if public) and physical mechanisms (must be fabricated post-Kickoff).",diff:"hard"},
{cat:"tournament",catLabel:"Event & Tournament Rules",rule:"T201",ruleId:"T201",headline:"Replays will be the same",ruleText:"All reasonable effort is made to create the same conditions when replaying a MATCH. Per the YELLOW and RED CARDS section, cards assigned in previous MATCHES, including prior instances of the MATCH to be replayed, are not cleared.",penalty:"MATCH will not start until the situation is corrected.",penType:"warn",q:"When a MATCH is replayed due to an ARENA FAULT, what happens to YELLOW and RED CARDS from the prior instance?",options:["They are cleared for the replay","They are not cleared \u2014 cards carry forward from the prior instance","Only RED CARDS carry forward","The Head REFEREE decides case by case"],answer:1,explain:"Cards are NOT cleared \u2014 they carry forward from prior instances of the replayed MATCH.",wrongExp:"Cards from all previous matches, including prior instances of the same match being replayed, carry forward. A BYPASSED team stays BYPASSED. Starting locations don\u2019t need to be replicated, but other conditions are preserved.",diff:"hard"},
{cat:"tournament",catLabel:"Event & Tournament Rules",rule:"Section 10.2",ruleId:"Section 10.2",headline:"ARENA FAULT definition",ruleText:"An ARENA FAULT is an error in ARENA operation including: broken FIELD elements from normal play or ROBOT abuse affecting opponents, power failure to a portion of the FIELD, improper activation by the FMS, errors by FIELD STAFF, and ROBOT radio disconnect impairing other ROBOTS for more than 8 seconds.",penalty:"MATCH replay if the fault affects the outcome and any team on the affected ALLIANCE desires a replay.",penType:"warn",q:"Which of the following is considered an ARENA FAULT?",options:["A robot\u2019s circuit breaker tripping in the DRIVER STATION","A robot failing to connect to the field","Improper activation by the FMS","A team\u2019s robot tipping over during play"],answer:2,explain:"Improper FMS activation is explicitly listed as an ARENA FAULT. Driver station breakers and robot tipping are not.",wrongExp:"ARENA FAULTS are specifically errors in ARENA operation \u2014 not robot-side issues. A circuit breaker tripping in the DRIVER STATION is explicitly stated to NOT be a power failure. A robot failing to connect or tipping are robot issues, not ARENA operation errors.",diff:"medium"},
{cat:"tournament",catLabel:"Event & Tournament Rules",rule:"T301",ruleId:"T301",headline:"Measurement, not practice",ruleText:"During the ARENA measurement period: A. ROBOTS can be enabled, but may neither drive, extend outside their ROBOT PERIMETER, nor interact with SCORING ELEMENTS, a HUB, BUMP, TRENCH, OUTPOST, or other FIELD elements. B. Humans may touch a SCORING ELEMENT but may not practice with it.",penalty:"VERBAL WARNING, plus YELLOW CARD if subsequent violations or egregious.",penType:"yellow",q:"During the ARENA measurement period before Qualification MATCHES, may ROBOTS drive?",options:["Yes \u2014 robots can drive freely to test autonomous routines","Yes \u2014 robots can be enabled but may NOT drive, extend, or interact with field elements","No \u2014 robots are not permitted on the field at all","Only if supervised by an inspector"],answer:1,explain:"ROBOTS can be enabled for sensor calibration but may NOT drive, extend, or interact with field or scoring elements.",wrongExp:"The measurement period allows robots ON the field and ENABLED \u2014 but with strict limitations. They cannot drive, extend outside their perimeter, or interact with any field elements. The purpose is sensor calibration and surveying, not practice.",diff:"hard"},
{cat:"tournament",catLabel:"Event & Tournament Rules",rule:"Section 10.5.3",ruleId:"Table 10-1",headline:"Qualification MATCH ranking criteria",ruleText:"Teams ranked in order: 1st \u2014 Ranking Score, 2nd \u2014 Average ALLIANCE MATCH points (not including MINOR FOULS and MAJOR FOULS), 3rd \u2014 Average FUEL scored in AUTO, 4th \u2014 Average TOWER points, 5th \u2014 Random sorting by FMS.",penalty:"N/A \u2014 Ranking procedure",penType:"info",q:"What is the first tiebreaker used to rank teams with equal Ranking Scores?",options:["Head-to-head record","Average ALLIANCE MATCH points (excluding fouls)","Total autonomous points scored","Random sorting by FMS"],answer:1,explain:"First tiebreaker is average ALLIANCE MATCH points excluding MINOR and MAJOR FOULS.",wrongExp:"The ranking criteria follow a specific order in Table 10-1: (1) Ranking Score, (2) average ALLIANCE MATCH points excluding fouls, (3) average FUEL scored in AUTO, (4) average TOWER points, (5) random FMS sorting. Head-to-head record is never a tiebreaker.",diff:"hard"},
{cat:"tournament",catLabel:"Event & Tournament Rules",rule:"T601",ruleId:"T601",headline:"Send your STUDENT representatives",ruleText:"Each team must choose and send a minimum of one and a maximum of three STUDENT team representatives. Representative(s) must report to the ARENA before the start of ALLIANCE Selection.",penalty:"Team is ineligible for the Playoff Tournament if not represented by the time they are announced.",penType:"red",q:"How many STUDENT representatives must each team send for ALLIANCE Selection?",options:["Exactly 1 STUDENT","Exactly 2 STUDENTS","A minimum of 1 and maximum of 3 STUDENTS","Any number of team members"],answer:2,explain:"Minimum 1, maximum 3 STUDENT representatives. A non-student may join only if there are exactly 2 student reps (T602).",wrongExp:"T601 specifies a range: minimum one, maximum three STUDENTS. T602 adds that a non-STUDENT may join only if the team has exactly two student representatives. Failing to have a representative present makes the team ineligible for Playoffs.",diff:"medium"},
{cat:"tournament",catLabel:"Event & Tournament Rules",rule:"T605",ruleId:"T605",headline:"Picks are time limited",ruleText:"Once the emcee requests an ALLIANCE\u2019S selection, the ALLIANCE is \u2018on the clock.\u2019 In round 1, the timer begins at 45 seconds (0:45); in round 2, the timer begins at 1 minute and 30 seconds (1:30).",penalty:"ALLIANCE is skipped (or receives the next highest-ranked unselected team if last pick in a round).",penType:"yellow",q:"In round 1 of ALLIANCE Selection, how long does each ALLIANCE CAPTAIN have to make their pick?",options:["30 seconds","45 seconds","60 seconds","90 seconds"],answer:1,explain:"45 seconds in round 1; 90 seconds (1:30) in round 2.",wrongExp:"The times differ by round: round 1 is 45 seconds, round 2 is 90 seconds (1:30). The extended time in round 2 accounts for additional strategic complexity. If time expires, the ALLIANCE is skipped and revisited after the next accepted invitation.",diff:"medium"},
{cat:"tournament",catLabel:"Event & Tournament Rules",rule:"T606",ruleId:"T606",headline:"Declining teams can\u2019t be picked",ruleText:"An ALLIANCE CAPTAIN may not invite a team that has declined another ALLIANCE\u2019S invitation to participate in the Playoff tournament. Declining teams are ineligible to be a BACKUP TEAM.",penalty:"Pick is invalid; clock continues running.",penType:"warn",q:"Can an ALLIANCE CAPTAIN invite a team that has already declined another ALLIANCE\u2019s invitation?",options:["Yes \u2014 any unselected team is eligible","Yes \u2014 but only if they are ranked higher","No \u2014 declining teams cannot be picked by any ALLIANCE","Only in round 2 of selections"],answer:2,explain:"Once a team declines, they cannot be invited by any other ALLIANCE and are ineligible to be a BACKUP TEAM.",wrongExp:"T606 creates a permanent consequence for declining: the team cannot be invited by ANY alliance and is also ineligible as a BACKUP TEAM. This makes declining a very significant strategic decision.",diff:"medium"},
{cat:"tournament",catLabel:"Event & Tournament Rules",rule:"E105",ruleId:"E105",headline:"Teams must check in",ruleText:"An adult team member must check in at the Pit Administration station no later than 90 minutes before Qualification MATCHES are scheduled to start.",penalty:"Teams contacted in pit. Failure to check in may result in not participating in the event.",penType:"red",q:"By when must an adult team member check in at Pit Administration?",options:["60 minutes before Qualification MATCHES start","90 minutes before Qualification MATCHES start","Before pits close the evening before","Before the team\u2019s first scheduled match"],answer:1,explain:"90 minutes before Qualification MATCHES start. Must be an adult team member.",wrongExp:"The deadline is exactly 90 minutes before Qualification MATCHES are scheduled to start \u2014 not 60 minutes, not the evening before, and not tied to a specific match. It must be an adult team member. Failure can result in non-participation.",diff:"medium"},
{cat:"tournament",catLabel:"Event & Tournament Rules",rule:"E118",ruleId:"E118",headline:"Enter only 1 ROBOT",ruleText:"Each registered team may enter only 1 ROBOT (or \u2018robot,\u2019 a ROBOT-like assembly equipped with most of its drive base) into a 2026 event. An assembly whose drive base is missing all wheels/treads, gearboxes, and belts/chains is not considered a \u2018ROBOT.\u2019",penalty:"VERBAL WARNING; egregious/subsequent escalation.",penType:"warn",q:"How many ROBOTS may a registered FRC team enter into a 2026 FRC event?",options:["1 ROBOT only","2 \u2014 one for competition and one for practice","As many as they want for spare parts","1 ROBOT plus 1 drive base for testing"],answer:0,explain:"Only 1 ROBOT per team per event. An assembly missing ALL wheels, gearboxes, and belts/chains is not a \u2018ROBOT.\u2019",wrongExp:"E118 limits each team to exactly 1 ROBOT. A second drive base would count as a \u2018robot\u2019 and violate this rule. However, an assembly missing ALL wheels/treads, gearboxes, AND belts/chains is not considered a ROBOT \u2014 stripped frames may be brought for spare parts.",diff:"easy"},
{cat:"tournament",catLabel:"Event & Tournament Rules",rule:"E401",ruleId:"E401",headline:"Load in during Load-In",ruleText:"Teams must load in the ROBOT and all ROBOT elements by the end of the last designated Load-In period. Exceptions: A. raw stock, B. OPERATOR CONSOLES, BUMPERS, battery assemblies, C. COTS items with minor modifications, D. 3D printed parts, E. gearboxes attached to associated motor(s), F. exceptional circumstances arranged with Event Management.",penalty:"Item will not be permitted into venue.",penType:"warn",q:"Which of the following items may be brought into the venue AFTER Load-In has ended?",options:["Complete robot mechanisms","Welded frame assemblies","BUMPERS, battery assemblies, and OPERATOR CONSOLES","Pre-assembled gearbox and motor combinations only"],answer:2,explain:"BUMPERS, batteries, OPERATOR CONSOLES, raw stock, COTS items with minor mods, 3D printed parts, and gearbox+motor combos are all exempt.",wrongExp:"E401 provides a specific exception list: raw stock, OPERATOR CONSOLES/BUMPERS/batteries, COTS items with minor modifications, 3D printed parts, and gearboxes with motors. Complete mechanisms and welded assemblies are NOT on this list and must be loaded during the designated period.",diff:"hard"},
];

let state={screen:"menu",selectedCats:[],questions:[],currentIdx:0,selectedAns:null,answered:false,results:[],showReview:false};
const CATS=[
{id:"introduction",label:"Introduction",tag:"SECTIONS 1 & 2",desc:"FIRST values, Gracious Professionalism, manual conventions, Q&A system"},
{id:"matchplay",label:"Match Play & Safety",tag:"SECTION 7",desc:"Personal safety, conduct, pre-match, in-match rules, opponent interaction, pinning"},
{id:"safety",label:"Safety & Event Etiquette",tag:"SECTIONS 7 & 14",desc:"PPE requirements, venue rules, wireless policies, load-in, pit regulations"},
{id:"robot",label:"Robot Construction & Inspection",tag:"SECTIONS 8 & 9",desc:"Size, weight, bumpers, motors, budget, COTS rules, inspection procedures"},
{id:"tournament",label:"Event & Tournament Rules",tag:"SECTIONS 10 & 14",desc:"Match replays, rankings, alliance selection, arena faults, advanced procedures"},
];
function qCountForCat(id){return Q.filter(q=>q.cat===id).length}
function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]]}return b}
function startQuiz(){const cats=state.selectedCats.length?state.selectedCats:CATS.map(c=>c.id);state.questions=shuffle(Q.filter(q=>cats.includes(q.cat)));state.currentIdx=0;state.selectedAns=null;state.answered=false;state.results=[];state.showReview=false;state.screen="quiz";render()}
function selectAnswer(idx){if(state.answered)return;state.selectedAns=idx;state.answered=true;const q=state.questions[state.currentIdx];state.results.push({qIdx:state.currentIdx,correct:idx===q.answer,selectedAns:idx});render()}
function nextQuestion(){if(state.currentIdx>=state.questions.length-1)state.screen="results";else{state.currentIdx++;state.selectedAns=null;state.answered=false}render();window.scrollTo({top:0,behavior:'smooth'})}
function goMenu(){state.screen="menu";state.selectedCats=[];render();window.scrollTo({top:0,behavior:'smooth'})}
function toggleCat(id){state.selectedCats.includes(id)?state.selectedCats=state.selectedCats.filter(c=>c!==id):state.selectedCats.push(id);render()}
function render(){const app=document.getElementById('app');if(state.screen==='menu')app.innerHTML=renderMenu();else if(state.screen==='quiz')app.innerHTML=renderQuiz();else app.innerHTML=renderResults();bindEvents()}
function renderMenu(){
const t=state.selectedCats.length?Q.filter(q=>state.selectedCats.includes(q.cat)).length:Q.length;
return `<div class="header"><div class="logo-badge"><span class="dot"></span>FRC 2026</div><h1>REBUILT<br>Rules Quiz</h1><p>Test your knowledge of the 2026 FIRST Robotics Competition Game Manual. Select categories or start with all ${Q.length} questions.</p></div>
<div class="categories">${CATS.map(c=>`<div class="cat-card ${state.selectedCats.includes(c.id)?'selected':''}" data-cat="${c.id}"><div class="cat-tag">${c.tag}</div><h3>${c.label}</h3><p>${c.desc}</p><div class="q-count">${qCountForCat(c.id)} Qs</div></div>`).join('')}</div>
<div class="btn-group"><button class="btn btn-primary" id="startBtn"${t===0?' disabled':''}>Start Quiz \u2014 ${t} Question${t!==1?'s':''}</button></div>`}

function renderQuiz(){
const q=state.questions[state.currentIdx],total=state.questions.length,pct=((state.currentIdx)/total*100).toFixed(0),L=['A','B','C','D'],ok=state.selectedAns===q.answer;
let exp='';
if(state.answered){
  if(ok){
    exp=`<div class="explanation correct-exp"><div class="exp-header">\u2713 Correct!</div><div class="exp-body">${q.explain}</div></div>`;
  } else {
    const penCls=q.penType==='warn'?'warn':q.penType==='info'?'info':'';
    exp=`<div class="explanation wrong-exp">
      <div class="exp-header">\u2717 Incorrect</div>
      <div class="exp-body" style="color:var(--text2)">${q.wrongExp}</div>
      <div class="exp-correct-ans"><svg viewBox="0 0 16 16"><path d="M8 0a8 8 0 110 16A8 8 0 018 0zm3.5 5.3a.75.75 0 00-1.06-1.06L7 7.69 5.56 6.25a.75.75 0 00-1.06 1.06l2 2a.75.75 0 001.06 0l4-4z"/></svg><span>Correct Answer: ${L[q.answer]}. ${q.options[q.answer]}</span></div>
      <div class="rule-cite">
        <div class="rule-cite-header"><svg viewBox="0 0 16 16"><path d="M2 0a2 2 0 00-2 2v12a2 2 0 002 2h12a2 2 0 002-2V2a2 2 0 00-2-2H2zm1 3h10v1H3V3zm0 3h10v1H3V6zm0 3h7v1H3V9z"/></svg><span>Game Manual Citation</span></div>
        <div class="rule-cite-rule">${q.ruleId}</div>
        <div class="rule-cite-headline">\u201c${q.headline}\u201d</div>
        <div class="rule-cite-text">${q.ruleText}</div>
        <div class="rule-cite-penalty ${penCls}">\u26a0 ${q.penalty}</div>
      </div>
    </div>`;
  }
}
return `<div class="fade-in"><div class="progress-bar"><div class="progress-track"><div class="progress-fill" style="width:${pct}%"></div></div><div class="progress-text">${state.currentIdx+1} / ${total}</div></div>
<div class="quiz-card"><div class="q-category">${q.catLabel} <span class="diff-badge ${q.diff}">${q.diff}</span></div><div class="q-rule-ref">${q.rule}</div><div class="q-text">${q.q}</div>
<div class="options">${q.options.map((o,i)=>{let c='option';if(state.answered){c+=' locked';if(i===q.answer)c+=' correct';else if(i===state.selectedAns&&i!==q.answer)c+=' wrong'}else if(state.selectedAns===i)c+=' selected';return `<button class="${c}" data-idx="${i}"><span class="letter">${L[i]}</span><span>${o}</span></button>`}).join('')}</div>
${exp}${state.answered?`<div class="btn-group"><button class="btn btn-primary" id="nextBtn">${state.currentIdx>=state.questions.length-1?'See Results':'Next Question \u2192'}</button></div>`:''}</div></div>`}

function renderResults(){
const total=state.results.length,correct=state.results.filter(r=>r.correct).length,pct=Math.round(correct/total*100),circum=2*Math.PI*72,offset=circum-(circum*pct/100),color=pct>=80?'var(--green)':pct>=50?'var(--yellow)':'var(--red)',L=['A','B','C','D'];
const msg=pct>=90?"Outstanding \u2014 you\u2019re ready for competition!":pct>=70?"Great job \u2014 solid understanding of the rules!":pct>=50?"Not bad \u2014 review the sections you missed.":"Keep studying \u2014 the manual is your best friend!";
const wrong=state.results.filter(r=>!r.correct);
return `<div class="results fade-in"><div class="logo-badge" style="margin-bottom:24px"><span class="dot"></span>QUIZ COMPLETE</div>
<div class="score-ring"><svg viewBox="0 0 160 160"><circle class="bg" cx="80" cy="80" r="72"/><circle class="fg" cx="80" cy="80" r="72" stroke="${color}" stroke-dasharray="${circum}" stroke-dashoffset="${offset}" style="transition:stroke-dashoffset 1.2s ease"/></svg><div class="score-pct"><div class="num" style="color:${color}">${pct}%</div><div class="label">${correct} of ${total}</div></div></div>
<h2>${msg}</h2>
<div class="stat-row"><div class="stat green"><div class="val">${correct}</div><div class="lbl">Correct</div></div><div class="stat red"><div class="val">${total-correct}</div><div class="lbl">Incorrect</div></div><div class="stat"><div class="val">${total}</div><div class="lbl">Total</div></div></div>
${wrong.length>0?`<div class="review-toggle" id="toggleReview">${state.showReview?'\u25be Hide Missed Questions':'\u25b8 Review Missed Questions ('+wrong.length+')'}</div>
${state.showReview?`<div class="fade-in">${wrong.map(r=>{const q=state.questions[r.qIdx];return `<div class="review-item">
<div class="ri-head"><div class="ri-icon">\u2717</div><div class="ri-q">${q.q}</div></div>
<div class="ri-detail"><strong>Your answer:</strong> ${L[r.selectedAns]}. ${q.options[r.selectedAns]}<br><strong style="color:var(--green)">Correct answer:</strong> ${L[q.answer]}. ${q.options[q.answer]}</div>
<div class="ri-cite"><div class="ri-cite-label">\ud83d\udcd6 ${q.ruleId}</div><div class="ri-cite-hl">\u201c${q.headline}\u201d</div><div class="ri-cite-text">${q.ruleText}</div><div class="ri-cite-pen">\u26a0 ${q.penalty}</div></div></div>`}).join('')}</div>`:''}`:''
}
<div class="btn-group" style="margin-top:32px"><button class="btn btn-primary" id="retryBtn">Try Again</button><button class="btn btn-secondary" id="menuBtn">Change Categories</button></div></div>`}

function bindEvents(){
document.querySelectorAll('.cat-card').forEach(el=>el.addEventListener('click',()=>toggleCat(el.dataset.cat)));
const s=document.getElementById('startBtn');if(s)s.addEventListener('click',startQuiz);
document.querySelectorAll('.option:not(.locked)').forEach(el=>el.addEventListener('click',()=>selectAnswer(parseInt(el.dataset.idx))));
const n=document.getElementById('nextBtn');if(n)n.addEventListener('click',nextQuestion);
const r=document.getElementById('retryBtn');if(r)r.addEventListener('click',startQuiz);
const m=document.getElementById('menuBtn');if(m)m.addEventListener('click',goMenu);
const t=document.getElementById('toggleReview');if(t)t.addEventListener('click',()=>{state.showReview=!state.showReview;render()})}
document.addEventListener('keydown',e=>{if(state.screen!=='quiz')return;if(!state.answered){const map={a:0,b:1,c:2,d:3,'1':0,'2':1,'3':2,'4':3};const idx=map[e.key.toLowerCase()];if(idx!==undefined&&idx<state.questions[state.currentIdx].options.length)selectAnswer(idx)}else if(e.key==='Enter'||e.key===' '||e.key==='ArrowRight'){e.preventDefault();nextQuestion()}});
render();
</script>
</body>
</html>
